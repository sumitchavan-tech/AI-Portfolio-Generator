<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Portfolio Generator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b
    );

    font-family:Arial,sans-serif;
}

.container{

    width:500px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    border:1px solid rgba(
        255,
        255,
        255,
        0.1
    );

    border-radius:20px;

    padding:40px;

    color:white;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:bold;
}

input[type="file"]{
    width:100%;
    margin-bottom:20px;
}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-size:16px;

    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

    <h1>AI Portfolio Generator</h1>

    <form
    action="/upload"
    method="POST"
    enctype="multipart/form-data">

        <label>
            Upload Resume (PDF)
        </label>

        <input
        type="file"
        name="resume"
        accept=".pdf"
        required>

        <label>
            Upload Profile Photo
        </label>

        <input
        type="file"
        name="photo"
        accept="image/*">

        <button type="submit">
            Generate Portfolio
        </button>

    </form>

</div>

</body>

</html>
